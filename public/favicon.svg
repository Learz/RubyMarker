<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Rounded background -->
  <rect width="32" height="32" rx="8" fill="#7c3aed"/>
  
  <!-- Neon fuchsia highlighter stroke behind the text -->
  <line x1="4" y1="18" x2="28" y2="18" stroke="#d946ef" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Centered bold Hiragana 'あ' -->
  <text x="16" y="23.5" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="19" font-weight="900" fill="#ffffff" text-anchor="middle">あ</text>
</svg>